<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{url_for('static', filename='style.css')}}">
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css">
    <title>House points</title>
</head>
<body class="w3-container">
    <header class = "w3-container w3-padding-32">
        <h1>House Points</h1>
        <nav class="w3-bar w3-light-grey">
            <a href="/" class="w3-bar-item w3-button">Home</a>
            <a href="/edit" class="w3-bar-item w3-button">Edit Score</a>
            <a href="/add_events" class="w3-bar-item w3-button">Add event</a>
            
            <a href="/login" class="w3-bar-item w3-button w3-right login_stuff">Login</a>
            <a href="/signup" class="w3-bar-item w3-button w3-right login_stuff">Sign Up</a>
        </nav>
    </header>
   
    <div class = "three-column">
        
       
        <div class =" w3-column w3-red">
            <h1>South</h1>
            <p>{{ house_points[0] }}</p>
        </div>
        <div class =" w3-column w3-blue">
            <h1>North</h1>
            <p>{{ house_points[1] }}</p>
        </div>
        <div class =" w3-column w3-yellow">
            <h1>West</h1>
            <p>{{ house_points[2] }}</p>
        </div>

    </div>
    {% block content %}
    {% endblock %}
</body>
</html>
