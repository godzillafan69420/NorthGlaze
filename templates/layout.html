<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{url_for('static', filename='style.css')}}">
    <link rel="stylesheet" href="https://www.w3schools.com/w3css/5/w3.css">
    <title>House points</title>
</head>
<body class="w3-container">
    <header class = "w3-container w3-padding-32">
        <h1>House Points</h1>
        <nav class = "w3-bar w3-light-grey">
            <a href="/">Home</a>
        </nav>
    </header>
    {% for house_point in house_points %}
    {% set south_point = house_point[0] %}
    {% set north_point = house_point[1] %}
    {% set west_point = house_point[2] %}
    {% endfor %}
    <div class = "three-column">
        <div class =" w3-column w3-red">
            <h2>South</h2>
            <p>{{ south_point }}</p>
        </div>
        <div class =" w3-column w3-blue">
            <h2>North</h2>
            <p>{{ north_point }}</p>
        </div>
        <div class =" w3-column w3-yellow">
            <h2>West</h2>
            <p>{{ west_point }}</p>
        </div>
    </div>
    {% block content %}
    {% endblock %}
</body>
</html>
