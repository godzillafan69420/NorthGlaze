
{% extends "layout.html" %}
{% block content %}
 
      <h1>Events</h1>
      <div class = "w3-row ">
        {% for list_of_events in event %}

            {% if list_of_events[5] == 0 %}

              <nav class = "w3-card w3-bar w3-light-grey">
                 <a href="{{ url_for('event_detail', id = list_of_events[0]) }}">{{ list_of_events[1] }}</a>
                 <h2>{{ list_of_events[3] }}</h2>
              </nav>
           
            {% endif %}
          
        {% endfor %}
      </div>

      

{% endblock %}
